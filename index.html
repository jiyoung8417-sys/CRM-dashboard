// ── CSV 파서 (컬럼 이름으로 읽음 — 엑셀 전체 붙여넣기 OK) ──
function parseCSV(text) {
  if (!text || !text.trim()) return [];
  try {
    const lines = text.trim().split(/\r?\n/);
    const hdrs = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
    return lines.slice(1).filter(l => l.trim()).map(line => {
      const vals = []; let cur = '', inQ = false;
      for (const c of line) {
        if (c === '"') inQ = !inQ;
        else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
        else cur += c;
      }
      vals.push(cur);
      const obj = {};
      hdrs.forEach((h, i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
      return obj;
    }).filter(r => Object.values(r).some(v => v));
  } catch(e) { console.error('CSV parse error:', e); return []; }
}

// ── 헬퍼 ──
function daysDiff(s) {
  if (!s) return 999;
  const p = String(s).split('.');
  if (p.length !== 3) return 999;
  return Math.floor((Date.now() - new Date(+p[0], +p[1]-1, +p[2]).getTime()) / 86400000);
}

function isStale(opp) {
  if (opp.진행상태 !== '진행중') return false;
  if (['개통완료','계약'].includes(opp.단계)) return false;
  const refDate = opp.변경일 || opp.시작일 || '';
  return daysDiff(refDate) >= 14;
}

// 금액 표시 (천원 단위)
function fmtAmt(n) {
  const num = Number(n);
  if (!num || num === 0) return '';
  const won = num * 1000;
  if (won >= 100000000) return (won/100000000).toFixed(1) + '억원';
  if (won >= 10000000) return Math.round(won/10000000) + '천만원';
  if (won >= 1000000) return (won/1000000).toFixed(1) + '백만원';
  if (won >= 10000) return Math.round(won/10000) + '만원';
  return (won/1000).toFixed(0) + '천원';
}

function rateClr(r) { return r >= 60 ? '#16A34A' : r >= 30 ? '#D97706' : '#EF4444'; }

function PipeBar({opp}) {
  const curr = STAGES.indexOf(opp.단계);
  return (
    <div style={{display:'flex', alignItems:'center', width:'100%', padding:'2px 0 6px'}}>
      {STAGES.map((s, i) => {
        const done = i <= curr, c = SCOL[i], last = i === STAGES.length - 1;

            <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:4, flexShrink:0}}>
              <div style={{width:22, height:22, borderRadius:'50%', background:done?c:'#E5E7EB',

  );
}

              <div style={{height:120}}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={data.map(d=>({name:d.n,value:d.v}))} dataKey="value"
                      innerRadius="55%" outerRadius="90%" paddingAngle={2} stroke="none">
                      {data.map((_,i) => <Cell key={i} fill={colors[i]}/>)}
                    </Pie>
                    <Tooltip formatter={(v,n) => [`${v}%`, n]}/>
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div style={{display:'flex', flexDirection:'column', gap:7}}>
                {data.map((d,i) => (
                  <div key={i} style={{display:'flex', alignItems:'center', gap:7, fontSize:11, color:'#475569'}}>
                    <div style={{width:7, height:7, borderRadius:'50%', background:colors[i], flexShrink:0}}/>
                    <span style={{flex:1}}>{d.n}</span>
                    <span style={{fontWeight:600, color:'#0F172A', fontFamily:'DM Mono,monospace'}}>{d.v}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Page 1: 파이프라인 현황 ──
function Page1({opps, contractMap}) {
  const [filters, setFilters] = useState({status:'전체', stage:'전체', group:'전체', rep:'전체'});
  const setF = (k, v) => setFilters(p => ({...p, [k]:v}));
  const statusOpts = ['전체','진행중','종료(성공)','종료(실패)','보류/연기'];
  const stageOpts  = ['전체', ...STAGES];
  const groupOpts  = ['전체', ...new Set(opps.map(o => o.group).filter(Boolean))];
  const repOpts    = ['전체', ...new Set(opps.map(o => o.담당자).filter(Boolean))];

  const filtered = useMemo(() => opps.filter(o => {
    if (filters.status !== '전체' && o.진행상태 !== filters.status) return false;
    if (filters.stage  !== '전체' && o.단계     !== filters.stage)  return false;
    if (filters.group  !== '전체' && o.group     !== filters.group)  return false;
    if (filters.rep    !== '전체' && o.담당자    !== filters.rep)    return false;
    return true;
  }), [opps, filters]);

  return (
    <div>
      {/* 필터 바 */}
      <div style={{background:'#fff', borderBottom:'1px solid #E4EAF2', padding:'10px 20px',
        display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
        position:'sticky', top:52, zIndex:40, boxShadow:'0 1px 6px rgba(0,0,0,.04)'}}>
        <SegGroup label="상태"   fk="status" opts={statusOpts} filters={filters} setF={setF}/>
        <SegGroup label="단계"   fk="stage"  opts={stageOpts}  filters={filters} setF={setF}/>
        <SegGroup label="그룹"   fk="group"  opts={groupOpts}  filters={filters} setF={setF}/>
        <SegGroup label="담당자" fk="rep"    opts={repOpts}    filters={filters} setF={setF}/>
        <span style={{marginLeft:'auto', fontSize:11, color:'#94A3B8'}}>
          총 <strong style={{color:'#475569'}}>{filtered.length}</strong>건
        </span>
      </div>
      {/* 카드 그리드 */}
      <div style={{maxWidth:1280, margin:'0 auto', padding:'18px 20px 36px'}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12, marginBottom:18}}>
          {filtered.length === 0
            ? <div style={{gridColumn:'1/-1', textAlign:'center', padding:'60px', color:'#94A3B8', fontSize:13}}>
                조건에 맞는 영업기회가 없습니다.
              </div>
            : filtered.map(o => <DealCard key={o.영업기회ID} opp={o}
                filterStatus={filters.status} contractMap={contractMap}/>)
          }
        </div>
        <WinLossSection/>
      </div>
    </div>
  );
}

// ── RateBar ──
function RateBar({rate, color}) {
  return (
    <div style={{display:'flex', alignItems:'center', gap:8}}>
      <div style={{flex:1, height:6, background:'#F1F5F9', borderRadius:20, overflow:'hidden'}}>
        <div style={{width:`${rate}%`, background:color, height:'100%', borderRadius:20}}/>
      </div>
      <span style={{fontSize:11, fontWeight:700, color, width:36, textAlign:'right',
        fontFamily:'DM Mono,monospace'}}>{rate}%</span>
    </div>
  );
}

// ── Page 2: 상세 현황 ──
function Page2({opps, contracts, groupMap}) {
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState({col:'계약일', dir:-1});
  const toggleSort = col => setSort(p => ({col, dir: p.col===col ? p.dir*-1 : -1}));

  // 담당자별 통계
  const repStats = useMemo(() => {
    const reps = [...new Set(opps.map(o => o.담당자).filter(Boolean))];
    return reps.map(rep => {
      const ds = opps.filter(o => o.담당자 === rep);
      const win  = ds.filter(o => o.진행상태 === '종료(성공)').length;
      const fail = ds.filter(o => o.진행상태 === '종료(실패)').length;
      const ing  = ds.filter(o => o.진행상태 === '진행중').length;
      const hold = ds.filter(o => o.진행상태 === '보류/연기').length;
      const tot  = ds.length;
      const winRate  = tot ? Math.round(win/tot*100) : 0;
      const failRate = tot ? Math.round(fail/tot*100) : 0;
      return {
        rep, group: groupMap[rep] || '미분류',
        total:tot, ing, win, fail, hold,
        winRate, failRate,
        stages: STAGES.map((s,i) => ({s, cnt:ds.filter(o=>o.단계===s).length, c:SCOL[i]})),
      };
    }).sort((a,b) => (a.group > b.group ? 1 : -1));
  }, [opps, groupMap]);

  // 계약 리스트 (영업기회 정보 포함)
  const oppMap = useMemo(() => {
    const m = {};
    opps.forEach(o => { m[String(o.영업기회ID)] = o; });
    return m;
  }, [opps]);

  const contractList = useMemo(() => {
    let list = contracts.map(c => ({
      ...c,
      opp: oppMap[String(c.영업기회ID)] || null,
      group: groupMap[c.담당자] || '',
    }));
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(c =>
        (c.고객사||'').toLowerCase().includes(q) ||
        (c.opp?.영업기회||'').toLowerCase().includes(q) ||
        (c.담당자||'').toLowerCase().includes(q)
      );
    }
    list.sort((a,b) => {
      const av = a[sort.col]||'', bv = b[sort.col]||'';
      return (typeof av==='number' ? av-bv : av>bv?1:av<bv?-1:0) * sort.dir;
    });
    return list;
  }, [contracts, oppMap, groupMap, search, sort]);

  const TH = ({col, label}) => {
    const active = sort.col === col;
    return (
      <th onClick={() => toggleSort(col)} style={{
        padding:'9px 12px', textAlign:'left', fontSize:10, fontWeight:700,
        color: active ? '#2563EB' : '#94A3B8', textTransform:'uppercase',
        letterSpacing:'0.06em', cursor:'pointer', whiteSpace:'nowrap', userSelect:'none',
        background:'#F8FAFD', borderBottom:'1px solid #E4EAF2',
      }}>
        {label} {active ? (sort.dir===1?'▲':'▼') : '↕'}
      </th>
    );
  };

  return (
    <div style={{maxWidth:1280, margin:'0 auto', padding:'18px 20px 40px', display:'flex', flexDirection:'column', gap:16}}>

      {/* 담당자별 통계 */}
      <div style={{background:'#fff', borderRadius:13, border:'1px solid #E4EAF2', padding:'18px 20px', boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
        <div style={{fontSize:13, fontWeight:600, color:'#475569', marginBottom:14}}>
          👥 담당자별 파이프라인 현황
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
            <thead>
              <tr>
                {['담당자','전체','진행중','성공','실패','보류'].map(h => (
                  <th key={h} style={{padding:'9px 12px', textAlign: h==='담당자'?'left':'center',
                    fontSize:10, fontWeight:700, color:'#94A3B8', textTransform:'uppercase',
                    letterSpacing:'0.06em', background:'#F8FAFD', borderBottom:'1px solid #E4EAF2', whiteSpace:'nowrap'}}>{h}</th>
                ))}
                <th style={{padding:'9px 12px', fontSize:10, fontWeight:700, color:'#94A3B8',
                  textTransform:'uppercase', letterSpacing:'0.06em', background:'#F8FAFD',
                  borderBottom:'1px solid #E4EAF2', minWidth:130}}>성공률</th>
                <th style={{padding:'9px 12px', fontSize:10, fontWeight:700, color:'#94A3B8',
                  textTransform:'uppercase', letterSpacing:'0.06em', background:'#F8FAFD',
                  borderBottom:'1px solid #E4EAF2', minWidth:130}}>실패율</th>
                <th style={{padding:'9px 12px', fontSize:10, fontWeight:700, color:'#94A3B8',
                  textTransform:'uppercase', letterSpacing:'0.06em', background:'#F8FAFD',
                  borderBottom:'1px solid #E4EAF2', minWidth:160}}>단계 분포</th>
              </tr>
            </thead>
            <tbody>
              {repStats.map(r => (
                <tr key={r.rep} style={{borderBottom:'1px solid #F8FAFC'}}>
                  <td style={{padding:'10px 12px'}}>
                    <div style={{fontWeight:600, color:'#0F172A'}}>{r.rep}</div>
                    <div style={{fontSize:10, color:'#94A3B8', marginTop:1}}>{r.group}</div>
                  </td>
                  {[[r.total,'#EFF6FF','#1E40AF'],[r.ing,'#DBEAFE','#1D4ED8'],
                    [r.win,'#D1FAE5','#065F46'],[r.fail,'#FEE2E2','#991B1B'],
                    [r.hold,'#F3F4F6','#374151']].map(([v,bg,tx],i) => (
                    <td key={i} style={{padding:'10px 12px', textAlign:'center'}}>
                      <span style={{background:bg, color:tx, fontSize:12, fontWeight:700,
                        padding:'2px 8px', borderRadius:20, fontFamily:'DM Mono,monospace'}}>{v}</span>
                    </td>
                  ))}
                  <td style={{padding:'10px 12px'}}><RateBar rate={r.winRate}  color={rateClr(r.winRate)}/></td>
                  <td style={{padding:'10px 12px'}}><RateBar rate={r.failRate} color="#EF4444"/></td>
                  <td style={{padding:'10px 12px'}}>
                    <div style={{display:'flex', gap:3}}>
                      {r.stages.map(({s,cnt,c}) => cnt>0 ? (
                        <div key={s} style={{width:18, height:18, borderRadius:'50%', background:c,
                          color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                          fontSize:9, fontWeight:700, flexShrink:0}} title={`${s}: ${cnt}건`}>{cnt}</div>
                      ) : null)}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* 계약 리스트 */}
      <div style={{background:'#fff', borderRadius:13, border:'1px solid #E4EAF2', padding:'18px 20px', boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:10}}>
          <div style={{fontSize:13, fontWeight:600, color:'#475569'}}>
            📋 계약 리스트
            <span style={{fontSize:11, color:'#94A3B8', fontWeight:400, marginLeft:6}}>총 {contractList.length}건</span>
          </div>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'#94A3B8', pointerEvents:'none'}}>🔍</span>
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="고객사, 영업기회, 담당자 검색..."
              style={{paddingLeft:30, paddingRight:12, paddingTop:7, paddingBottom:7,
                fontSize:12, border:'1px solid #E4EAF2', borderRadius:8, outline:'none', width:240, color:'#0F172A'}}/>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
            <thead>
              <tr>
                <TH col="고객사" label="고객사"/>
                <th style={{padding:'9px 12px', textAlign:'left', fontSize:10, fontWeight:700, color:'#94A3B8',
                  textTransform:'uppercase', letterSpacing:'0.06em', background:'#F8FAFD',
                  borderBottom:'1px solid #E4EAF2', minWidth:200}}>영업기회명</th>
                <TH col="담당자" label="담당자"/>
                <TH col="계약일" label="계약일"/>
                <TH col="연관제품" label="제품"/>
                <TH col="공급가액" label="공급가액"/>
              </tr>
            </thead>
            <tbody>
              {contractList.map((c, i) => (
                <tr key={i} style={{borderBottom:'1px solid #F8FAFC'}}>
                  <td style={{padding:'10px 12px'}}>
                    <div style={{fontWeight:600, color:'#0F172A'}}>{c.고객사}</div>
                  </td>
                  <td style={{padding:'10px 12px', maxWidth:240}}>
                    <div style={{fontSize:11, color:'#475569', whiteSpace:'nowrap', overflow:'hidden',
                      textOverflow:'ellipsis'}} title={c.opp?.영업기회||''}>
                      {c.opp?.영업기회 || '-'}
                    </div>
                  </td>
                  <td style={{padding:'10px 12px', whiteSpace:'nowrap'}}>
                    <div style={{fontWeight:500, color:'#0F172A'}}>{c.담당자}</div>
                    <div style={{fontSize:10, color:'#94A3B8'}}>{c.group}</div>
                  </td>
                  <td style={{padding:'10px 12px', whiteSpace:'nowrap', fontSize:11,
                    color:META, fontFamily:'DM Mono,monospace'}}>{c.계약일}</td>
                  <td style={{padding:'10px 12px'}}>
                    {c.연관제품 && (
                      <span style={{background:'#F3F4F6', color:'#374151', fontSize:10, fontWeight:600,
                        padding:'2px 7px', borderRadius:20, whiteSpace:'nowrap'}}>{c.연관제품}</span>
                    )}
                  </td>
                  <td style={{padding:'10px 12px', textAlign:'right', fontFamily:'DM Mono,monospace',
                    fontSize:12, fontWeight:600, color:'#0F172A', whiteSpace:'nowrap'}}>
                    {c.공급가액 ? fmtAmt(c.공급가액) : '-'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <WinLossSection/>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]   = useState('p1');
  const [opps, setOpps] = useState([]);
  const [contracts, setContracts] = useState([]);
  const [groupMap, setGroupMap]   = useState({});
  const [loading, setLoading]     = useState(false);
  const [lastUpd, setLastUpd]     = useState('');
  const [usingMock, setUsingMock] = useState(true);

  // 구글 시트 데이터 fetch
  useEffect(() => {
    const hasUrls = Object.values(URLS).some(u => u && u.trim());
    if (!hasUrls) {
      // Mock 데이터 사용
      loadMockData();
      return;
    }
    setLoading(true);
    Promise.all([
      fetch(URLS.opp).then(r => r.text()).catch(() => null),
      fetch(URLS.contract).then(r => r.text()).catch(() => null),
      fetch(URLS.group).then(r => r.text()).catch(() => null),
    ]).then(([oppText, contractText, groupText]) => {
      const gm = buildGroupMap(groupText ? parseCSV(groupText) : MOCK_GROUP);
      const oppData = oppText ? parseCSV(oppText) : MOCK_OPP;
      const contractData = contractText ? parseCSV(contractText) : MOCK_CONTRACT;
      processAndSet(oppData, contractData, gm);
      setLastUpd(new Date().toLocaleDateString('ko-KR'));
      setUsingMock(false);
    }).catch(() => loadMockData())
      .finally(() => setLoading(false));
  }, []);

  function buildGroupMap(groupRows) {
    const gm = {};
    groupRows.forEach(r => { if (r['이름']) gm[r['이름']] = r['그룹']; });
    return gm;
  }

  function processAndSet(oppData, contractData, gm) {
    // 영업기회에 그룹 정보 추가
    const enriched = oppData.map(o => ({...o, group: gm[o['담당자']] || ''}));
    setOpps(enriched);

    // 계약 중 영업기회 연결된 것만
    const linkedContracts = contractData.filter(c => c['영업기회ID']);
    setContracts(linkedContracts);
    setGroupMap(gm);
  }

  function loadMockData() {
    const gm = buildGroupMap(MOCK_GROUP);
    processAndSet(MOCK_OPP, MOCK_CONTRACT, gm);
    setLastUpd('Mock Data');
    setUsingMock(true);
  }

  // 계약 맵 (영업기회ID → 계약 배열)
  const contractMap = useMemo(() => {
    const m = {};
    contracts.forEach(c => {
      const k = String(c['영업기회ID'] || c.영업기회ID || '');
      if (k) { if (!m[k]) m[k]=[]; m[k].push(c); }
    });
    return m;
  }, [contracts]);

  const staleCount = useMemo(() => opps.filter(o => isStale(o)).length, [opps]);

  return (
    <div style={{minHeight:'100vh', background:'#F2F5FA'}}>
      {/* 헤더 */}
      <div style={{background:'#0B1F45', height:52, display:'flex', alignItems:'center',
        justifyContent:'space-between', padding:'0 20px', position:'sticky', top:0, zIndex:50,
        boxShadow:'0 2px 12px rgba(11,31,69,.28)'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div style={{width:30, height:30, background:'#2563EB', borderRadius:7,
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white"
              strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div>
            <div style={{fontSize:14, fontWeight:700, color:'#fff', lineHeight:1.3}}>영업 파이프라인 CRM</div>
            <div style={{fontSize:10, color:'#93C5FD'}}>Sales Pipeline Management</div>
          </div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          {loading && <span style={{fontSize:11, color:'#93C5FD'}}>⏳ 데이터 로딩 중...</span>}
          {usingMock && !loading && (
            <span style={{fontSize:10, background:'rgba(255,255,255,.15)', color:'#FCD34D',
              padding:'2px 8px', borderRadius:20, fontWeight:600}}>📊 Mock Data</span>
          )}
          {lastUpd && !usingMock && (
            <span style={{fontSize:10, color:'#7DD3FC'}}>업데이트: {lastUpd}</span>
          )}
          {staleCount > 0 && (
            <span style={{background:'#EF4444', color:'#fff', fontSize:11, fontWeight:600,
              padding:'3px 11px', borderRadius:20}}>🚨 정체 {staleCount}건</span>
          )}
          <div style={{display:'flex', gap:2}}>
            {[['p1','📋 파이프라인'], ['p2','📊 상세 현황']].map(([t,l]) => (
              <button key={t} onClick={() => setTab(t)} style={{
                padding:'5px 14px', borderRadius:7, border:'none', cursor:'pointer', fontFamily:'inherit',
                background: tab===t ? '#2563EB' : 'transparent',
                color: tab===t ? '#fff' : '#93C5FD',
                fontSize:12, fontWeight:600,
              }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      {tab === 'p1'
        ? <Page1 opps={opps} contractMap={contractMap}/>
        : <Page2 opps={opps} contracts={contracts} groupMap={groupMap}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
