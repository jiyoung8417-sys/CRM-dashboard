<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>영업 파이프라인 CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F2F5FA;color:#0F172A;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
input,button{font-family:inherit}

.hdr{background:#0B1F45;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(11,31,69,.28)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-ic{width:30px;height:30px;background:#2563EB;border-radius:7px;display:flex;align-items:center;justify-content:center}
.hdr-ic svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.hdr-nm{font-size:14px;font-weight:700;color:#fff}
.hdr-sb{font-size:10px;color:#93C5FD}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge-stale{background:#EF4444;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-mock{background:rgba(255,255,255,.2);color:#FCD34D;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-upd{font-size:10px;color:#7DD3FC}
.tabs{display:flex;gap:2px}
.tab{padding:5px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.tab.on{background:#2563EB;color:#fff}
.tab.off{background:transparent;color:#93C5FD}

.fbar{background:#fff;border-bottom:1px solid #E4EAF2;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:52px;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.fg{display:flex;align-items:center;gap:6px}
.fl{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.seg{display:flex;background:#F1F5F9;border-radius:8px;padding:2px;gap:2px}
.sb{padding:4px 10px;border-radius:6px;border:none;background:transparent;font-size:11px;font-weight:600;color:#64748B;cursor:pointer;white-space:nowrap;transition:all .12s}
.sb.on{background:#fff;color:#0B1F45;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.fc{font-size:11px;color:#94A3B8;margin-left:auto}
.fc strong{color:#475569}

.main{max-width:1280px;margin:0 auto;padding:18px 20px 40px}
.view{display:none}
.view.on{display:block}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}

.card{background:#fff;border-radius:13px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid #E4EAF2}
.card.stale{border:2px solid #EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.08)}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.ctl{flex:1;min-width:0}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.ctitle{font-size:13px;font-weight:600;color:#0F172A;line-height:1.4;word-break:keep-all}
.sbox{flex-shrink:0;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:6px 10px;text-align:center;min-width:58px}
.sd{font-size:16px;font-weight:700;color:#DC2626;line-height:1;font-family:monospace}
.sl{font-size:9px;font-weight:600;color:#F87171;margin-top:2px}

/* pipeline bar */
.pipe{display:flex;align-items:center;width:100%;padding:2px 0 6px}
.pnode{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.pdot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.ptxt{font-size:9px;font-weight:500;white-space:nowrap}
.pline{flex:1;height:2.5px;margin:0 2px 14px;border-radius:2px;min-width:6px}

.cinfo{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-top:1px solid #F8FAFC;padding-top:10px}
.ci{font-size:11px;color:#475569}
.cmeta{font-size:11px;color:#8496B0;font-family:monospace}
.fnote{margin-top:10px;background:#FFF5F5;border:1px solid #FECACA;border-radius:8px;padding:8px 12px;display:flex;gap:7px}
.fnl{font-size:10px;font-weight:700;color:#991B1B;display:block;margin-bottom:2px}
.fnt{font-size:11px;color:#7F1D1D;line-height:1.5}

/* win/loss bars */
.wl-card{background:#fff;border-radius:13px;border:1px solid #E4EAF2;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.wl-ttl{font-size:12px;font-weight:600;color:#64748B;margin-bottom:16px}
.wl-2col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:600px){.wl-2col{grid-template-columns:1fr}}
.wl-sub{font-size:11px;font-weight:700;margin-bottom:12px}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:#475569;width:120px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:10px;background:#F1F5F9;border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px}
.bar-val{font-size:11px;font-weight:600;width:32px;text-align:right;font-family:monospace}

/* page 2 */
.p2sec{background:#fff;border-radius:13px;border:1px solid #E4EAF2;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.p2ttl{font-size:13px;font-weight:600;color:#475569;margin-bottom:14px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;background:#F8FAFD;border-bottom:1px solid #E4EAF2;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFBFF}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:monospace}
.rbar{display:flex;align-items:center;gap:8px}
.rtrack{flex:1;height:6px;background:#F1F5F9;border-radius:20px;overflow:hidden}
.rfill{height:100%;border-radius:20px}
.rval{font-size:11px;font-weight:700;width:34px;text-align:right;font-family:monospace}
.sw{position:relative}
.sw input{padding:7px 12px 7px 28px;font-size:12px;border:1px solid #E4EAF2;border-radius:8px;outline:none;width:240px;color:#0F172A}
.sw input:focus{border-color:#2563EB}
.sw-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:#94A3B8}
.sth{cursor:pointer;user-select:none}
.sth:hover{color:#475569}
.empty{text-align:center;padding:60px;color:#94A3B8;font-size:13px}
.p2top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-ic"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div><div class="hdr-nm">영업 파이프라인 CRM</div><div class="hdr-sb">Sales Pipeline Management</div></div>
  </div>
  <div class="hdr-right">
    <span class="badge-mock" id="bmock" style="display:none">📊 Mock Data</span>

        </div>

          <div id="lbars"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="vp2" class="view">

      </div>
      <div style="overflow-x:auto"><table class="tbl" id="ctbl"></table></div>
    </div>
  </div>
</div>

  {고객사:'아이나비시스템즈',영업기회ID:'1059',계약일:'2026.05.19',연관제품:'기업전용회선',공급가액:800,담당자:'이영철'},
  {고객사:'한국도로공사',영업기회ID:'1058',계약일:'2026.05.14',연관제품:'기업전용회선',공급가액:600,담당자:'이영철'},
  {고객사:'Tencent',영업기회ID:'989',계약일:'2026.05.08',연관제품:'글로벌DCI',공급가액:16400,담당자:'김창석'},
];

let OPP=[],CONTRACT=[],GM={},F={status:'전체',stage:'전체',group:'전체',rep:'전체'};
let CS={col:'계약일',dir:-1};

function csv(t){
  if(!t||!t.trim()) return [];
  try{
    const ls=t.trim().split(/\r?\n/);
    const hs=ls[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
    return ls.slice(1).filter(l=>l.trim()).map(l=>{
      const vs=[]; let c='',q=false;
      for(const x of l){if(x==='"')q=!q;else if(x===','&&!q){vs.push(c);c='';}else c+=x;}
      vs.push(c);
      const o={}; hs.forEach((h,i)=>o[h]=(vs[i]||'').replace(/^"|"$/g,'').trim());
      return o;
    }).filter(r=>Object.values(r).some(v=>v));
  }catch(e){return [];}
}

function dd(s){
  if(!s) return 999;
  const p=String(s).split('.');
  if(p.length!==3) return 999;
  return Math.floor((Date.now()-new Date(+p[0],+p[1]-1,+p[2]).getTime())/86400000);
}
function stale(o){return o.진행상태==='진행중'&&!['개통완료','계약'].includes(o.단계)&&dd(o.변경일||o.시작일)>=14;}
function fmtA(n){
  const v=Number(n)*1000;
  if(!v) return '';
  if(v>=100000000) return (v/100000000).toFixed(1)+'억원';
  if(v>=10000000) return Math.round(v/10000000)+'천만원';
  if(v>=1000000) return (v/1000000).toFixed(1)+'백만원';
  if(v>=10000) return Math.round(v/10000)+'만원';
  return v.toLocaleString()+'원';
}
function fmtAD(n){const v=Number(n)*1000;if(!v)return '-';if(v>=100000000)return(v/100000000).toFixed(1)+'억원';if(v>=10000000)return Math.round(v/10000000)+'천만원';if(v>=1000000)return(v/1000000).toFixed(1)+'백만원';if(v>=10000)return Math.round(v/10000)+'만원';return v.toLocaleString()+'원';}
function rc(r){return r>=60?'#16A34A':r>=30?'#D97706':'#EF4444';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function pipeHTML(o){
  const ci=STAGES.indexOf(o.단계);
  let h='<div class="pipe">';
  STAGES.forEach((s,i)=>{
    const d=i<=ci,c=SC[i];
    h+=`<div class="pnode"><div class="pdot" style="background:${d?c:'#E5E7EB'};color:${d?'#fff':'#9CA3AF'};${d?`box-shadow:0 1px 5px ${c}55`:''}">${i+1}</div><span class="ptxt" style="color:${d?c:'#9CA3AF'}">${s}</span></div>`;
    if(i<STAGES.length-1) h+=`<div class="pline" style="background:${i<ci?c:'#E5E7EB'}"></div>`;
  });
  return h+'</div>';
}

function cardHTML(o){
  const st=stale(o), sd=st?dd(o.변경일||o.시작일):0;
  const sa=o.단계==='기회인지'&&Number(o.예상매출)>0;
  const sn=o.진행상태==='종료(실패)'&&o.비고;
  const cfg=SM[o.진행상태]||{l:o.진행상태,bg:'#F3F4F6',tx:'#374151',ic:'·'};
  const rd=o.변경일||o.시작일||'';
  return `<div class="card${st?' stale':''}">
    <div class="ctop">
      <div class="ctl">
        <div class="ctags">
          <span class="tag" style="background:${cfg.bg};color:${cfg.tx}">${cfg.ic} ${cfg.l}</span>
          ${o.제품?`<span class="tag" style="background:#F3F4F6;color:#374151">${esc(o.제품)}</span>`:''}
        </div>
        <div class="ctitle">${esc(o.영업기회)}</div>
      </div>
      ${st?`<div class="sbox"><div class="sd">${sd}일</div><div class="sl">🚨 정체</div></div>`:'<div style="width:58px;flex-shrink:0"></div>'}
    </div>
    ${pipeHTML(o)}
    <div class="cinfo">
      <span class="ci"><strong style="color:#0F172A">${esc(o.담당자)}</strong>${o.group?` · ${esc(o.group)}`:''}</span>
      <span class="ci">${esc(o.고객사)}</span>
      <span class="cmeta">${esc(o.시작일)}${rd?' ~ '+esc(rd):''}${sa?'   '+fmtA(o.예상매출):''}</span>
    </div>
    ${sn?`<div class="fnote"><span style="color:#DC2626;flex-shrink:0">📋</span><div><span class="fnl">실패 사유</span><span class="fnt">${esc(o.비고)}</span></div></div>`:''}
  </div>`;
}

function filtered(){
  return OPP.filter(o=>{
    if(F.status!=='전체'&&o.진행상태!==F.status) return false;
    if(F.stage!=='전체'&&o.단계!==F.stage) return false;
    if(F.group!=='전체'&&o.group!==F.group) return false;
    if(F.rep!=='전체'&&o.담당자!==F.rep) return false;
    return true;
  });
}

function sf(k,v){F[k]=v;renderFbar();renderCards();}
window.sf=sf;

function renderFbar(){
  const gs=['전체',...new Set(OPP.map(o=>o.group).filter(Boolean))];
  const rs=['전체',...new Set(OPP.map(o=>o.담당자).filter(Boolean))];
  const ss2=['전체',...STAGES];
  const sts=['전체','진행중','종료(성공)','종료(실패)','보류/연기'];
  function seg(fk,opts){return `<div class="seg">${opts.map(v=>`<button class="sb${F[fk]===v?' on':''}" onclick="sf('${fk}','${esc(v)}')">${esc(v)}</button>`).join('')}</div>`;}
  const fil=filtered();
  document.getElementById('fbar').innerHTML=`
    <div class="fg"><span class="fl">상태</span>${seg('status',sts)}</div>
    <div class="fg"><span class="fl">단계</span>${seg('stage',ss2)}</div>
    <div class="fg"><span class="fl">그룹</span>${seg('group',gs)}</div>
    <div class="fg"><span class="fl">담당자</span>${seg('rep',rs)}</div>
    <span class="fc">총 <strong>${fil.length}</strong>건</span>`;
}

function renderCards(){
  const fil=filtered();
  const g=document.getElementById('cardgrid');
  g.innerHTML=fil.length?fil.map(cardHTML).join(''):'<div class="empty">조건에 맞는 영업기회가 없습니다.</div>';
}

function renderWL(){
  function bars(el,data,colors){
    el.innerHTML=data.map((d,i)=>`<div class="bar-item">
      <span class="bar-lbl">${esc(d.n)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${d.v}%;background:${colors[i]}"></div></div>
      <span class="bar-val" style="color:${colors[i]}">${d.v}%</span>
    </div>`).join('');
  }
  bars(document.getElementById('wbars'),WD,WC);
  bars(document.getElementById('lbars'),LD,LC);
}

function renderRep(){
  const reps=[...new Set(OPP.map(o=>o.담당자).filter(Boolean))];
  const rows=reps.map(rep=>{
    const ds=OPP.filter(o=>o.담당자===rep);
    const w=ds.filter(o=>o.진행상태==='종료(성공)').length;
    const f=ds.filter(o=>o.진행상태==='종료(실패)').length;
    const i=ds.filter(o=>o.진행상태==='진행중').length;
    const h=ds.filter(o=>o.진행상태==='보류/연기').length;
    const t=ds.length,wr=t?Math.round(w/t*100):0,fr=t?Math.round(f/t*100):0;
    const wc=rc(wr);
    const sdots=STAGES.map((s,si)=>{const cnt=ds.filter(o=>o.단계===s).length;return cnt>0?`<div style="width:18px;height:18px;border-radius:50%;background:${SC[si]};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-right:2px" title="${s}: ${cnt}건">${cnt}</div>`:null;}).filter(Boolean).join('');
    return `<tr>
      <td><div style="font-weight:600">${esc(rep)}</div><div style="font-size:10px;color:#94A3B8">${esc(GM[rep]||'')}</div></td>
      <td style="text-align:center"><span class="pill" style="background:#EFF6FF;color:#1E40AF">${t}</span></td>
      <td style="text-align:center"><span class="pill" style="background:#DBEAFE;color:#1D4ED8">${i}</span></td>
      <td style="text-align:center"><span class="pill" style="background:#D1FAE5;color:#065F46">${w}</span></td>
      <td style="text-align:center"><span class="pill" style="background:#FEE2E2;color:#991B1B">${f}</span></td>
      <td style="text-align:center"><span class="pill" style="background:#F3F4F6;color:#374151">${h}</span></td>
      <td style="min-width:120px"><div class="rbar"><div class="rtrack"><div class="rfill" style="width:${wr}%;background:${wc}"></div></div><span class="rval" style="color:${wc}">${wr}%</span></div></td>
      <td style="min-width:120px"><div class="rbar"><div class="rtrack"><div class="rfill" style="width:${fr}%;background:#EF4444"></div></div><span class="rval" style="color:#EF4444">${fr}%</span></div></td>
      <td><div style="display:flex;gap:2px;flex-wrap:wrap">${sdots}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('reptbl').innerHTML=`
    <thead><tr><th>담당자</th><th style="text-align:center">전체</th><th style="text-align:center">진행중</th><th style="text-align:center">성공</th><th style="text-align:center">실패</th><th style="text-align:center">보류</th><th>성공률</th><th>실패율</th><th>단계분포</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="9" class="empty">데이터 없음</td></tr>'}</tbody>`;
}

function renderContracts(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const om={};OPP.forEach(o=>{om[String(o.영업기회ID)]=o;});
  let list=CONTRACT.map(c=>({...c,opp:om[String(c.영업기회ID)]||null,group:GM[c.담당자]||''}));
  if(q) list=list.filter(c=>(c.고객사||'').toLowerCase().includes(q)||(c.opp?.영업기회||'').toLowerCase().includes(q)||(c.담당자||'').toLowerCase().includes(q));
  list.sort((a,b)=>{const av=a[CS.col]||'',bv=b[CS.col]||'';return(typeof av==='number'?av-bv:av>bv?1:av<bv?-1:0)*CS.dir;});
  document.getElementById('ccount').textContent='총 '+list.length+'건';
  function th(col,lbl){const a=CS.col===col;return `<th class="sth" style="${a?'color:#2563EB':''}" onclick="sortC('${col}')">${lbl} ${a?(CS.dir===1?'▲':'▼'):'↕'}</th>`;}
  const rows=list.map(c=>`<tr>
    <td><div style="font-weight:600">${esc(c.고객사)}</div></td>
    <td style="max-width:200px"><div style="font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(c.opp?.영업기회||'')}">${esc(c.opp?.영업기회||'-')}</div></td>
    <td><div style="font-weight:500">${esc(c.담당자)}</div><div style="font-size:10px;color:#94A3B8">${esc(c.group)}</div></td>
    <td style="font-family:monospace;font-size:11px;color:#8496B0;white-space:nowrap">${esc(c.계약일||'')}</td>
    <td>${c.연관제품?`<span class="tag" style="background:#F3F4F6;color:#374151">${esc(c.연관제품)}</span>`:'-'}</td>
    <td style="text-align:right;font-family:monospace;font-weight:600;white-space:nowrap">${fmtAD(c.공급가액)}</td>
  </tr>`).join('');
  document.getElementById('ctbl').innerHTML=`
    <thead><tr>${th('고객사','고객사')}<th>영업기회명</th>${th('담당자','담당자')}${th('계약일','계약일')}<th>제품</th>${th('공급가액','금액')}</tr></thead>
    <tbody>${rows||'<tr><td colspan="6" class="empty">데이터 없음</td></tr>'}</tbody>`;
}
window.renderContracts=renderContracts;

function sortC(col){CS={col,dir:CS.col===col?CS.dir*-1:-1};renderContracts();}
window.sortC=sortC;

function gotoTab(t){
  document.getElementById('vp1').className='view'+(t==='p1'?' on':'');
  document.getElementById('vp2').className='view'+(t==='p2'?' on':'');
  document.querySelectorAll('.tab').forEach((b,i)=>{b.className='tab '+(i===0&&t==='p1'||i===1&&t==='p2'?'on':'off');});
  if(t==='p2'){renderRep();renderContracts();}
}
window.gotoTab=gotoTab;

function buildGM(rows){const g={};rows.forEach(r=>{if(r['이름'])g[r['이름']]=r['그룹'];});return g;}

function load(oppR,contractR,gm){
  GM=gm;
  OPP=oppR.map(o=>({...o,group:gm[o['담당자']]||''}));
  CONTRACT=contractR.filter(c=>c['영업기회ID']);
  const sc=OPP.filter(o=>stale(o)).length;
  const bs=document.getElementById('bstale');
  bs.textContent='🚨 정체 '+sc+'건';
  bs.style.display=sc>0?'':'none';
  renderFbar();renderCards();renderWL();
}

async function init(){
  try{
    const [ot,ct,gt]=await Promise.all([
      fetch(URLS.opp).then(r=>r.ok?r.text():null).catch(()=>null),
      fetch(URLS.contract).then(r=>r.ok?r.text():null).catch(()=>null),
      fetch(URLS.group).then(r=>r.ok?r.text():null).catch(()=>null),
    ]);
    const gm=buildGM(gt?csv(gt):MG);
    const op=ot?csv(ot):null;
    if(op&&op.length>0){
      load(op,ct?csv(ct):MC,gm);
      const bu=document.getElementById('bupd');
      bu.textContent='업데이트: '+new Date().toLocaleDateString('ko-KR');
      bu.style.display='';
    } else throw new Error('empty');
  } catch(e){
    load(MO,MC,buildGM(MG));
    document.getElementById('bmock').style.display='';
  }
}
init();
</script>
