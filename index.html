<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>영업 파이프라인 CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F2F5FA;color:#0F172A;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
input,button,select{font-family:inherit}

/* HEADER */
.hdr{background:#0B1F45;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(11,31,69,.28)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-icon{width:30px;height:30px;background:#2563EB;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-name{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
.hdr-sub{font-size:10px;color:#93C5FD}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-badge{background:#EF4444;color:#fff;font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px}
.hdr-mock{font-size:10px;background:rgba(255,255,255,.15);color:#FCD34D;padding:2px 8px;border-radius:20px;font-weight:600}
.hdr-upd{font-size:10px;color:#7DD3FC}
.tab-nav{display:flex;gap:2px}
.tab-btn{padding:5px 14px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s}
.tab-btn.on{background:#2563EB;color:#fff}
.tab-btn.off{background:transparent;color:#93C5FD}

/* FILTER BAR */
.fbar{background:#fff;border-bottom:1px solid #E4EAF2;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:52px;z-index:40;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.fbar-group{display:flex;align-items:center;gap:6px}
.fbar-label{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.seg{display:flex;background:#F1F5F9;border-radius:8px;padding:2px;gap:2px}
.seg-btn{padding:4px 10px;border-radius:6px;border:none;background:transparent;font-size:11px;font-weight:600;color:#64748B;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.seg-btn.on{background:#fff;color:#0B1F45;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.fbar-count{font-size:11px;color:#94A3B8;margin-left:auto}
.fbar-count strong{color:#475569}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:18px 20px 40px}
.view{display:none}
.view.on{display:block}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
@media(max-width:800px){.cards-grid{grid-template-columns:1fr}}

/* CARD */
.card{background:#fff;border-radius:13px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:border-color .15s}
.card.normal{border:1px solid #E4EAF2}
.card.stale{border:2px solid #EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.08)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-tl{flex:1;min-width:0}
.card-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.card-title{font-size:13px;font-weight:600;color:#0F172A;line-height:1.4;word-break:keep-all}
.stale-box{flex-shrink:0;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:6px 10px;text-align:center;min-width:58px}
.stale-days{font-size:16px;font-weight:700;color:#DC2626;line-height:1;font-family:'DM Mono',monospace}
.stale-lbl{font-size:9px;font-weight:600;color:#F87171;margin-top:2px}
.ph{flex-shrink:0;width:58px}

/* PIPELINE */
.pipe{display:flex;align-items:center;width:100%;padding:2px 0 6px}
.pn{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.pt{font-size:9px;font-weight:500;white-space:nowrap}
.ps{flex:1;height:2.5px;margin:0 2px 14px;border-radius:2px;min-width:6px}

/* CARD INFO */
.ci{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-top:1px solid #F8FAFC;padding-top:10px}
.ci-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#475569}
.ci-meta{font-size:11px;color:#8496B0;font-family:'DM Mono',monospace}
.fail-note{margin-top:10px;background:#FFF5F5;border:1px solid #FECACA;border-radius:8px;padding:8px 12px;display:flex;gap:7px}
.fn-lbl{font-size:10px;font-weight:700;color:#991B1B;display:block;margin-bottom:2px}
.fn-txt{font-size:11px;color:#7F1D1D;line-height:1.5}

/* WIN/LOSS */
.wl-wrap{background:#fff;border-radius:13px;border:1px solid #E4EAF2;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.wl-title{font-size:12px;font-weight:600;color:#64748B;margin-bottom:14px}
.wl-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.wl-sub{font-size:11px;font-weight:700;margin-bottom:10px}
.wl-row{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}
.wl-ch{height:120px;position:relative}
.wl-leg{display:flex;flex-direction:column;gap:7px}
.wl-li{display:flex;align-items:center;gap:7px;font-size:11px;color:#475569}
.wl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wl-pct{font-weight:600;color:#0F172A;margin-left:auto;font-family:'DM Mono',monospace;font-size:11px}

/* PAGE 2 */
.p2-section{background:#fff;border-radius:13px;border:1px solid #E4EAF2;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.p2-title{font-size:13px;font-weight:600;color:#475569;margin-bottom:14px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;background:#F8FAFD;border-bottom:1px solid #E4EAF2;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
.tbl tr:hover td{background:#FAFBFF}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.rate-wrap{display:flex;align-items:center;gap:8px}
.rate-track{flex:1;height:6px;background:#F1F5F9;border-radius:20px;overflow:hidden}
.rate-fill{height:100%;border-radius:20px}
.rate-val{font-size:11px;font-weight:700;width:36px;text-align:right;font-family:'DM Mono',monospace}
.search-wrap{position:relative}
.search-wrap input{padding-left:28px;padding-right:12px;padding-top:7px;padding-bottom:7px;font-size:12px;border:1px solid #E4EAF2;border-radius:8px;outline:none;width:240px;color:#0F172A}
.search-wrap input:focus{border-color:#2563EB}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:#475569}
.empty{text-align:center;padding:60px;color:#94A3B8;font-size:13px;grid-column:1/-1}
</style>
</head>
<body>
<div id="root">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div><div class="hdr-name">영업 파이프라인 CRM</div><div class="hdr-sub">Sales Pipeline Management</div></div>
    </div>
    <div class="hdr-right">
      <span class="hdr-mock" id="mock-badge" style="display:none">📊 Mock Data</span>
      <span class="hdr-upd" id="upd-badge" style="display:none"></span>
      <span class="hdr-badge" id="stale-badge" style="display:none"></span>
      <div class="tab-nav">
        <button class="tab-btn on" onclick="switchTab('p1')">📋 파이프라인</button>
        <button class="tab-btn off" onclick="switchTab('p2')">📊 상세 현황</button>
      </div>
    </div>
  </div>

  <!-- PAGE 1 -->
  <div id="view-p1" class="view on">
    <div class="fbar" id="fbar"></div>
    <div class="main">
      <div class="cards-grid" id="cards-grid"></div>
      <div class="wl-wrap">
        <div class="wl-title">📊 Win / Loss 분석</div>
        <div class="wl-grid">
          <div>
            <div class="wl-sub" style="color:#16A34A">🏆 성공 요인</div>
            <div class="wl-row">
              <div class="wl-ch"><canvas id="wChart"></canvas></div>
              <div class="wl-leg" id="wLeg"></div>
            </div>
          </div>
          <div>
            <div class="wl-sub" style="color:#DC2626">📉 이탈 사유</div>
            <div class="wl-row">
              <div class="wl-ch"><canvas id="lChart"></canvas></div>
              <div class="wl-leg" id="lLeg"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div id="view-p2" class="view">
    <div class="main">
      <div class="p2-section">
        <div class="p2-title">👥 담당자별 파이프라인 현황</div>
        <div style="overflow-x:auto"><table class="tbl" id="rep-table"></table></div>
      </div>
      <div class="p2-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <div class="p2-title" style="margin-bottom:0">📋 계약 리스트 <span id="contract-count" style="font-size:11px;color:#94A3B8;font-weight:400"></span></div>
          <div class="search-wrap"><span class="search-ico">🔍</span><input type="text" id="search-input" placeholder="고객사, 영업기회, 담당자 검색..." oninput="renderContracts()"/></div>
        </div>
        <div style="overflow-x:auto"><table class="tbl" id="contract-table"></table></div>
      </div>
    </div>
  </div>
</div>

// ── CSV 파서 ──
function parseCSV(text){
  if(!text||!text.trim()) return [];
  try{
    const lines=text.trim().split(/\r?\n/);
    const hdrs=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
    return lines.slice(1).filter(l=>l.trim()).map(line=>{
      const vals=[]; let cur='',inQ=false;
      for(const c of line){
        if(c==='"') inQ=!inQ;
        else if(c===','&&!inQ){vals.push(cur);cur='';}
        else cur+=c;
      }
      vals.push(cur);
      const obj={};
      hdrs.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
      return obj;
    }).filter(r=>Object.values(r).some(v=>v));
  }catch(e){return [];}
}

// ── 헬퍼 ──
function daysDiff(s){
  if(!s) return 999;
  const p=String(s).split('.');
  if(p.length!==3) return 999;
  return Math.floor((Date.now()-new Date(+p[0],+p[1]-1,+p[2]).getTime())/86400000);
}
function isStale(o){
  if(o.진행상태!=='진행중') return false;
  if(['개통완료','계약'].includes(o.단계)) return false;
  return daysDiff(o.변경일||o.시작일)>=14;
}
function fmtAmt(n){
  const num=Number(n)*1000;
  if(!num||num===0) return '';
  if(num>=100000000) return (num/100000000).toFixed(1)+'억원';
  if(num>=10000000) return Math.round(num/10000000)+'천만원';
  if(num>=1000000) return (num/1000000).toFixed(1)+'백만원';
  if(num>=10000) return Math.round(num/10000)+'만원';
  return num.toLocaleString()+'원';
}
function fmtAmtDirect(n){
  const num=Number(n)*1000;
  if(!num) return '-';
  if(num>=100000000) return (num/100000000).toFixed(1)+'억원';
  if(num>=10000000) return Math.round(num/10000000)+'천만원';
  if(num>=1000000) return (num/1000000).toFixed(1)+'백만원';
  if(num>=10000) return Math.round(num/10000)+'만원';
  return num.toLocaleString()+'원';
}
function rateClr(r){return r>=60?'#16A34A':r>=30?'#D97706':'#EF4444';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── 파이프라인 바 HTML ──
function pipeBarHTML(opp){
  const curr=STAGES.indexOf(opp.단계);
  let html='<div class="pipe">';
  STAGES.forEach((s,i)=>{
    const done=i<=curr, c=SCOL[i], last=i===STAGES.length-1;
    html+=`<div class="pn">
      <div class="pd" style="background:${done?c:'#E5E7EB'};color:${done?'#fff':'#9CA3AF'};${done?`box-shadow:0 1px 5px ${c}66`:''}">${i+1}</div>
      <span class="pt" style="color:${done?c:'#9CA3AF'}">${s}</span>
    </div>`;
    if(!last) html+=`<div class="ps" style="background:${i<curr?c:'#E5E7EB'}"></div>`;
  });
  return html+'</div>';
}

  const isFail=o.진행상태==='종료(실패)';

  const cfg=STATUS_MAP[o.진행상태]||{label:o.진행상태,bg:'#F3F4F6',tx:'#374151',ic:'·'};
  const refDate=o.변경일||o.시작일||'';
  return `
  <div class="card ${stale?'stale':'normal'}">
    <div class="card-top">
      <div class="card-tl">
        <div class="card-tags">
          <span class="tag" style="background:${cfg.bg};color:${cfg.tx}">${cfg.ic} ${cfg.label}</span>
          ${o.제품?`<span class="tag" style="background:#F3F4F6;color:#374151">${esc(o.제품)}</span>`:''}

  const reps=['전체',...new Set(ALL_OPP.map(o=>o.담당자).filter(Boolean))];

  const statuses=['전체','진행중','종료(성공)','종료(실패)','보류/연기'];

    return `<div class="seg">${opts.map(v=>`<button class="seg-btn${filters[fk]===v?' on':''}" onclick="setFilter('${fk}','${esc(v)}')">${esc(v)}</button>`).join('')}</div>`;
  }
  const filtered=getFiltered();
  document.getElementById('fbar').innerHTML=`

    <span class="fbar-count">총 <strong>${filtered.length}</strong>건</span>`;

function getFiltered(){
  return ALL_OPP.filter(o=>{
    if(filters.status!=='전체'&&o.진행상태!==filters.status) return false;
    if(filters.stage!=='전체'&&o.단계!==filters.stage) return false;
    if(filters.group!=='전체'&&o.group!==filters.group) return false;
    if(filters.rep!=='전체'&&o.담당자!==filters.rep) return false;
    return true;
  });
}

function setFilter(k,v){

// ── 데이터 처리 ──
function buildGroupMap(rows){
  const gm={};
  rows.forEach(r=>{if(r['이름']) gm[r['이름']]=r['그룹'];});
  return gm;
}

function processData(oppRows,contractRows,gm){
  GROUP_MAP=gm;
  ALL_OPP=oppRows.map(o=>({...o,group:gm[o['담당자']]||''}));
  ALL_CONTRACT=contractRows.filter(c=>c['영업기회ID']);

  const staleCount=ALL_OPP.filter(o=>isStale(o)).length;
  const sb=document.getElementById('stale-badge');
  if(staleCount>0){sb.textContent='🚨 정체 '+staleCount+'건';sb.style.display='';}
  else sb.style.display='none';

  renderFilterBar();
  renderCards();
  renderCharts();
}

// ── 초기 로드 ──
async function init(){
  try{
    const [oppText,contractText,groupText]=await Promise.all([
      fetch(URLS.opp).then(r=>r.text()),
      fetch(URLS.contract).then(r=>r.text()),
      fetch(URLS.group).then(r=>r.text()),
    ]);
    const gm=buildGroupMap(parseCSV(groupText)||MOCK_GROUP);
    const oppRows=parseCSV(oppText);
    const contractRows=parseCSV(contractText);
    if(oppRows&&oppRows.length>0){
      processData(oppRows,contractRows&&contractRows.length>0?contractRows:MOCK_CONTRACT,gm);
      const upd=document.getElementById('upd-badge');
      upd.textContent='업데이트: '+new Date().toLocaleDateString('ko-KR');
      upd.style.display='';
    } else {
      throw new Error('empty');
    }
  } catch(e){
    processData(MOCK_OPP,MOCK_CONTRACT,buildGroupMap(MOCK_GROUP));
    document.getElementById('mock-badge').style.display='';
  }
}

init();
</script>
