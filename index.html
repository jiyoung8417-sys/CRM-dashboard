<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>영업 파이프라인 CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F5F7FB;color:#1E293B;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
input,button{font-family:inherit}

/* ── HEADER ── */
.hdr{background:#1E3A5F;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(30,58,95,.2)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-ic{width:28px;height:28px;background:#4A90D9;border-radius:6px;display:flex;align-items:center;justify-content:center}
.hdr-ic svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.hdr-nm{font-size:13px;font-weight:700;color:#fff}
.hdr-sb{font-size:10px;color:#A8C4E0}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge-mock{background:rgba(255,255,255,.15);color:#FDE68A;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-upd{font-size:10px;color:#93C5FD}
.tabs{display:flex;gap:2px}
.tab{padding:5px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.tab.on{background:#4A90D9;color:#fff}
.tab.off{background:transparent;color:#A8C4E0}

/* ── FILTER BAR ── */
.fbar{background:#fff;border-bottom:1px solid #E8ECF2;padding:10px 22px 10px;display:flex;flex-direction:column;gap:8px;position:sticky;top:50px;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.fbar-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fl{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:32px}
.fc{font-size:11px;color:#94A3B8;margin-left:auto}
.fc strong{color:#475569}

/* 상태 필터 버튼 - 각 상태별 색상 */
.seg{display:flex;gap:4px;flex-wrap:wrap}
.sb{padding:4px 11px;border-radius:20px;border:1.5px solid transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;background:#F1F5F9;color:#64748B}
.sb:hover{filter:brightness(.95)}
.sb.on{border-color:currentColor}

/* 상태별 색 */
.sb-all{background:#F1F5F9;color:#475569}
.sb-all.on{background:#E2E8F0;border-color:#94A3B8}
.sb-ing{background:#EFF6FF;color:#3B82F6}
.sb-ing.on{background:#DBEAFE;border-color:#3B82F6}
.sb-ok{background:#FFF1F2;color:#E11D48}
.sb-ok.on{background:#FFE4E6;border-color:#E11D48}
.sb-fail{background:#F8FAFC;color:#64748B}
.sb-fail.on{background:#E2E8F0;border-color:#64748B}
.sb-hold{background:#F8FAFC;color:#94A3B8}
.sb-hold.on{background:#E2E8F0;border-color:#94A3B8}

/* 단계별 색 */
.sb-s0{background:#FFF7F5;color:#E85D2E}.sb-s0.on{background:#FFE8E1;border-color:#E85D2E}
.sb-s1{background:#FDF4FF;color:#C026D3}.sb-s1.on{background:#F5D0FE;border-color:#C026D3}
.sb-s2{background:#EFF6FF;color:#2563EB}.sb-s2.on{background:#DBEAFE;border-color:#2563EB}
.sb-s3{background:#FFFBEB;color:#D97706}.sb-s3.on{background:#FEF3C7;border-color:#D97706}
.sb-s4{background:#F0FDF4;color:#16A34A}.sb-s4.on{background:#DCFCE7;border-color:#16A34A}

/* 그룹/담당자 버튼 */
.sb-n{background:#F8FAFC;color:#475569}.sb-n.on{background:#E2E8F0;border-color:#64748B}

/* ── MAIN ── */
.main{max-width:1320px;margin:0 auto;padding:16px 20px 40px}
.view{display:none}
.view.on{display:block}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:16px}
@media(max-width:780px){.grid2{grid-template-columns:1fr}}

/* ── CARD ── */
.card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #E8ECF2;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.09)}
.card.stale{border:2px solid #EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.08)}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.ctl{flex:1;min-width:0}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.ctitle{font-size:13px;font-weight:600;color:#1E293B;line-height:1.4;word-break:keep-all}
.sbox{flex-shrink:0;background:#FFF5F5;border:1px solid #FED7D7;border-radius:8px;padding:4px 8px;text-align:center;min-width:52px}
.sd{font-size:11px;font-weight:700;color:#DC2626;line-height:1.3;font-family:monospace}
.sl{font-size:8px;font-weight:600;color:#F87171}

/* pipeline */
.pipe{display:flex;align-items:center;width:100%;padding:2px 0 6px}
.pnode{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.pdot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.ptxt{font-size:8px;font-weight:500;white-space:nowrap}
.pline{flex:1;height:2px;margin:0 2px 13px;border-radius:2px;min-width:6px}

/* card info */
.cinfo{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid #F1F5F9;padding-top:9px}
.ci{font-size:11px;color:#475569}
.cmeta{font-size:11px;color:#94A3B8;font-family:monospace}
.fnote{margin-top:9px;background:#FFF5F5;border:1px solid #FED7D7;border-radius:8px;padding:7px 11px;display:flex;gap:7px}
.fnl{font-size:10px;font-weight:700;color:#DC2626;display:block;margin-bottom:1px}
.fnt{font-size:11px;color:#DC2626;line-height:1.5}

/* ── WIN/LOSS ── */
.wl-card{background:#fff;border-radius:12px;border:1px solid #E8ECF2;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.wl-ttl{font-size:12px;font-weight:600;color:#64748B;margin-bottom:14px}
.wl-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.wl-2col{grid-template-columns:1fr}}
.wl-sub{font-size:11px;font-weight:700;margin-bottom:10px}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:11px;color:#475569;width:110px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:8px;background:#F1F5F9;border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px}
.bar-val{font-size:11px;font-weight:600;width:30px;text-align:right;font-family:monospace}

/* ── PAGE 2 ── */
.p2-fbar{background:#fff;border-bottom:1px solid #E8ECF2;padding:10px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.p2sec{background:#fff;border-radius:12px;border:1px solid #E8ECF2;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.p2ttl{font-size:13px;font-weight:600;color:#475569;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;background:#F8FAFD;border-bottom:1px solid #E8ECF2;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid #F5F7FB;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFBFF}
.tbl th.r{text-align:right}.tbl td.r{text-align:right}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:monospace}
.rbar{display:flex;align-items:center;gap:7px}
.rtrack{flex:1;height:5px;background:#F1F5F9;border-radius:20px;overflow:hidden}
.rfill{height:100%;border-radius:20px}
.rval{font-size:11px;font-weight:700;width:34px;text-align:right;font-family:monospace}
.sw{position:relative}
.sw input{padding:6px 12px 6px 28px;font-size:12px;border:1px solid #E8ECF2;border-radius:8px;outline:none;width:220px;color:#1E293B}
.sw input:focus{border-color:#4A90D9}
.sw-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:#94A3B8;font-size:12px}
.sth{cursor:pointer;user-select:none}
.sth:hover{color:#475569}
.p2top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.empty{text-align:center;padding:48px;color:#94A3B8;font-size:13px}
</style>
</head>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-ic"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div><div class="hdr-nm">영업 파이프라인 CRM</div><div class="hdr-sb">Sales Pipeline Management</div></div>

// ── CSV 파서 ──
function csv(t){
  if(!t||!t.trim()) return [];
  try{
    const ls=t.trim().split(/\r?\n/);
    const hs=ls[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
    return ls.slice(1).filter(l=>l.trim()).map(l=>{
      const vs=[]; let c='',q=false;
      for(const x of l){if(x==='"')q=!q;else if(x===','&&!q){vs.push(c);c='';}else c+=x;}
      vs.push(c);
      const o={}; hs.forEach((h,i)=>o[h]=(vs[i]||'').replace(/^"|"$/g,'').trim());
      return o;
    }).filter(r=>Object.values(r).some(v=>v));
  }catch(e){return [];}
}

// ── 헬퍼 ──
function dd(s){
  if(!s) return 999;
  const p=String(s).split('.');
  if(p.length!==3) return 999;
  return Math.floor((Date.now()-new Date(+p[0],+p[1]-1,+p[2]).getTime())/86400000);
}
function stale(o){return o.진행상태==='진행중'&&!['개통완료','계약'].includes(o.단계)&&dd(o.변경일||o.시작일)>=14;}
function fmtA(n){
  const v=Number(n)*1000;
  if(!v||v===0) return '';
  if(v>=100000000) return (v/100000000).toFixed(1)+'억원';
  if(v>=10000000) return Math.round(v/10000000)+'천만원';
  if(v>=1000000) return (v/1000000).toFixed(1)+'백만원';
  if(v>=10000) return Math.round(v/10000)+'만원';
  return v.toLocaleString()+'원';
}
function fmtAD(n){
  const v=Number(n)*1000;
  if(!v) return '-';
  if(v>=100000000) return (v/100000000).toFixed(1)+'억원';
  if(v>=10000000) return Math.round(v/10000000)+'천만원';
  if(v>=1000000) return (v/1000000).toFixed(1)+'백만원';
  if(v>=10000) return Math.round(v/10000)+'만원';
  return v.toLocaleString()+'원';
}
function rc(r){return r>=60?'#DC2626':r>=30?'#F59E0B':'#94A3B8';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  });
  return h+'</div>';
}

  </tr>`).join('');
  document.getElementById('reptbl').innerHTML=`
    <thead><tr><th>담당자</th><th class="r">전체</th><th class="r">진행중</th><th class="r">성공</th><th class="r">실패</th><th class="r">보류</th><th>성공률</th><th>실패율</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="8" class="empty">데이터 없음</td></tr>'}</tbody>`;
}

// ── Contract List (금액 높은 순) ──
function renderContracts(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const om={};OPP.forEach(o=>{om[String(o.영업기회ID)]=o;});
  let list=CONTRACT.map(c=>({...c,opp:om[String(c.영업기회ID||c['영업기회ID'])]||null,group:GM[c.담당자||c['담당자']]||'',_amt:Number(c.공급가액||c['공급가액']||0)}));
  // 그룹 필터
  if(F2.group!=='전체') list=list.filter(c=>c.group===F2.group);
  // 검색
  if(q) list=list.filter(c=>(c.고객사||'').toLowerCase().includes(q)||(c.opp?.영업기회||'').toLowerCase().includes(q)||(c.담당자||'').toLowerCase().includes(q));
  // 정렬
  list.sort((a,b)=>{
    const av=a[CS.col]||a._amt||'', bv=b[CS.col]||b._amt||'';
    if(CS.col==='공급가액') return (b._amt-a._amt)*Math.sign(-CS.dir+0.001)||b._amt-a._amt; // 금액 높은 순 기본
    return(typeof av==='number'?av-bv:av>bv?1:av<bv?-1:0)*CS.dir;
  });
  document.getElementById('ccount').textContent='총 '+list.length+'건';
  function th(col,lbl){const a=CS.col===col;return `<th class="sth r" style="${a?'color:#3B82F6':''}" onclick="sortC('${col}')">${lbl} ${a?(CS.dir===1?'▲':'▼'):'↕'}</th>`;}
  const rows=list.map(c=>`<tr>
    <td><div style="font-weight:600;color:#1E293B">${esc(c.고객사||c['고객사']||'')}</div></td>
    <td style="max-width:200px"><div style="font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(c.opp?.영업기회||'')}">${esc(c.opp?.영업기회||'-')}</div></td>
    <td><div style="font-weight:500">${esc(c.담당자||c['담당자']||'')}</div><div style="font-size:10px;color:#94A3B8">${esc(c.group)}</div></td>
    <td style="font-family:monospace;font-size:11px;color:#94A3B8;white-space:nowrap">${esc(c.계약일||c['계약일']||'')}</td>
    <td>${(c.연관제품||c['연관제품'])?`<span class="tag" style="background:#F1F5F9;color:#64748B">${esc(c.연관제품||c['연관제품'])}</span>`:'-'}</td>
    <td class="r" style="font-family:monospace;font-weight:600;color:#1E293B;white-space:nowrap">${fmtAD(c._amt)}</td>
  </tr>`).join('');
  document.getElementById('ctbl').innerHTML=`
    <thead><tr><th>고객사</th><th>영업기회명</th><th>담당자</th><th>계약일</th><th>제품</th>${th('공급가액','금액')}</tr></thead>
    <tbody>${rows||'<tr><td colspan="6" class="empty">데이터 없음</td></tr>'}</tbody>`;
}
window.renderContracts=renderContracts;

function sortC(col){CS={col,dir:CS.col===col?CS.dir*-1:-1};renderContracts();}
window.sortC=sortC;

// ── Tab ──
function gotoTab(t){
  currentTab=t;
  document.getElementById('vp1').className='view'+(t==='p1'?' on':'');
  document.getElementById('vp2').className='view'+(t==='p2'?' on':'');
  document.querySelectorAll('.tab').forEach((b,i)=>{b.className='tab '+(i===0&&t==='p1'||i===1&&t==='p2'?'on':'off');});
  if(t==='p2') renderPage2();
}
window.gotoTab=gotoTab;

function renderPage2(){renderFbar2();renderGrpTable();renderRepTable();renderContracts();}

// ── Data Load ──
function buildGM(rows){const g={};rows.forEach(r=>{if(r['이름'])g[r['이름']]=r['그룹'];});return g;}

function loadData(oppR,contractR,gm){
  GM=gm;
  OPP=oppR.map(o=>({...o,group:gm[o['담당자']]||''}));
  CONTRACT=contractR;
  renderFbar1();
  renderCards();
}

async function init(){
  try{
    const [ot,ct,gt]=await Promise.all([
      fetch(URLS.opp).then(r=>r.ok?r.text():null).catch(()=>null),
      fetch(URLS.contract).then(r=>r.ok?r.text():null).catch(()=>null),
      fetch(URLS.group).then(r=>r.ok?r.text():null).catch(()=>null),
    ]);
    const gm=buildGM(gt?csv(gt):MG);
    const op=ot?csv(ot):null;
    if(op&&op.length>0){
      loadData(op, ct?csv(ct):MC, gm);
      const bu=document.getElementById('bupd');
      bu.textContent='업데이트: '+new Date().toLocaleDateString('ko-KR');
      bu.style.display='';
    } else throw new Error('empty');
  }catch(e){
    loadData(MO,MC,buildGM(MG));
    document.getElementById('bmock').style.display='';
  }
}
init();
</script>
</body>
</html>
