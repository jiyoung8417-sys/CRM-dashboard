<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>영업 파이프라인 CRM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:'Pretendard',sans-serif;
  background:#F4F6FA;
  min-height:100vh;
  color:#1E293B;
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
button,input{font-family:inherit}

/* 글라스 공통 */
.glass{
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:0.5px solid rgba(255,255,255,.9);
}
.glass-dark{
  background:rgba(20,16,60,.55);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:0.5px solid rgba(255,255,255,.14);
}

/* ══ HEADER ══ */
.hdr{
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:100;
  background:#1E3A5F;
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 2px 8px rgba(30,58,95,.2);
}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#818CF8,#EC4899);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(129,140,248,.4);
}
.hdr-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.hdr-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-mock{font-size:10px;font-weight:700;color:#FDE68A;background:rgba(253,230,138,.12);padding:3px 9px;border-radius:20px;border:0.5px solid rgba(253,230,138,.3)}
.hdr-upd{font-size:10px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);padding:3px 9px;border-radius:20px}
.hdr-search-wrap{position:relative}
.hdr-search-wrap input{
  padding:6px 12px 6px 30px;font-size:11px;
  background:rgba(255,255,255,.1);
  border:0.5px solid rgba(255,255,255,.2);
  border-radius:9px;color:#fff;outline:none;width:200px;
  font-family:inherit;
  transition:all .15s;
}
.hdr-search-wrap input::placeholder{color:rgba(255,255,255,.35)}
.hdr-search-wrap input:focus{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.35)}
.hdr-search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:12px;pointer-events:none}
.tabs{display:flex;background:rgba(255,255,255,.08);border-radius:10px;padding:3px;gap:2px}
.tab{padding:5px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.tab.on{background:linear-gradient(135deg,#818CF8,#A78BFA);color:#fff;box-shadow:0 2px 8px rgba(129,140,248,.4)}
.tab.off{background:transparent;color:rgba(255,255,255,.6)}
.tab.off:hover{background:rgba(255,255,255,.1);color:#fff}

/* ══ SUMMARY BAR ══ */
.summary-bar{
  padding:14px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:54px;z-index:90;
  background:#fff;
  border-bottom:1px solid #E8ECF2;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.sum-card{
  display:flex;align-items:center;gap:10px;
  padding:9px 18px;border-radius:12px;cursor:pointer;
  transition:all .15s;border:1.5px solid transparent;flex-shrink:0;
  background:#F4F6FA;
}
.sum-card:hover{transform:translateY(-1px);background:#ECEEF4}
.sum-card.active{border-color:currentColor}
.sum-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sum-num{font-size:22px;font-weight:800;line-height:1;font-family:'DM Mono',monospace}
.sum-lbl{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.sc-all  {color:#475569}.sc-all  .sum-ic{background:#E2E8F0}
.sc-ing  {color:#3B6FD4}.sc-ing  .sum-ic{background:#DBEAFE}
.sc-ok   {color:#9D174D}.sc-ok   .sum-ic{background:#F4C0D1}
.sc-fail {color:#64748B}.sc-fail .sum-ic{background:#E2E8F0}
.sum-div{width:1px;height:32px;background:#E2E8F2;flex-shrink:0}

/* ══ FILTER BAR ══ */
.fbar{
  padding:10px 24px;display:flex;flex-direction:column;gap:7px;
  position:sticky;top:130px;z-index:80;
  background:#FAFBFD;
  border-bottom:1px solid #E8ECF2;
}
.frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fl{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;width:36px;flex-shrink:0}
.seg{display:flex;gap:4px;flex-wrap:wrap}
.sb{padding:3px 11px;border-radius:20px;border:1.5px solid transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;background:#fff;color:#64748B;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.sb:hover{background:#F1F5F9}
.sb.on{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.fbar-count{font-size:11px;color:#94A3B8;margin-left:auto}
.fbar-count strong{color:#475569;font-weight:700}

/* ══ MAIN ══ */
.main{max-width:1360px;margin:0 auto;padding:16px 20px 40px}
.view{display:none}
.view.on{display:block}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:840px){.grid2{grid-template-columns:1fr}}

/* ══ DEAL CARD ══ */
.card{
  background:#fff;border:1px solid #E8ECF2;
  border-radius:14px;padding:14px 16px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card.c-ing{border-color:rgba(96,165,250,.5)}
.card.c-ok {border-color:rgba(236,72,153,.4)}
.card.c-fail{border-color:rgba(203,213,225,.5)}
.card.c-hold{border-color:rgba(203,213,225,.4)}

.stale-tag{
  position:absolute;top:10px;right:12px;
  font-size:9px;font-weight:700;color:#F87171;
  background:rgba(254,226,226,.9);border:0.5px solid rgba(248,113,113,.4);
  padding:2px 8px;border-radius:20px;backdrop-filter:blur(4px);
}

.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.ctitle{font-size:13px;font-weight:700;color:#1E1B4B;line-height:1.4;margin-bottom:12px;padding-right:48px}

/* pipeline */
.pipe{display:flex;gap:3px;margin-bottom:12px}
.pnode{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.pbox{
  width:100%;padding:5px 2px;border-radius:6px;
  font-size:9px;font-weight:800;letter-spacing:.03em;
  text-align:center;transition:all .2s;
}
.ptxt{font-size:8px;font-weight:500;white-space:nowrap}

/* card footer */
.cfoot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:0.5px solid rgba(99,102,241,.12)}
.cf-ava{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.cf-rep{font-size:11px;color:#3730A3;font-weight:600}
.cf-grp{font-size:11px;color:#8B83C8;font-weight:400}
.cf-co{font-size:11px;color:#6B7280}
.cf-meta{font-size:10px;color:#9CA3AF;font-family:'DM Mono',monospace;margin-left:auto}
.cf-amt{font-size:11px;font-weight:400;color:#1E293B;font-family:'DM Mono',monospace}

/* note */
.fnote{margin-top:9px;background:rgba(239,68,68,.07);border:0.5px solid rgba(239,68,68,.25);border-radius:9px;padding:8px 12px;display:flex;gap:7px}
.fnl{font-size:10px;font-weight:700;color:#DC2626;display:block;margin-bottom:1px}
.fnt{font-size:11px;color:#B91C1C;line-height:1.5}

/* rep-left */
.rep-left-txt{text-decoration:line-through;color:#9CA3AF}
.badge-left{font-size:9px;font-weight:700;background:rgba(148,163,184,.15);color:#94A3B8;padding:1px 6px;border-radius:20px;border:0.5px solid rgba(148,163,184,.3)}

/* ══ PAGE 2 ══ */
.p2-fbar{
  padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:54px;z-index:90;
  background:#fff;border-bottom:1px solid #E8ECF2;
}
.p2-main{max-width:1360px;margin:0 auto;padding:16px 20px 40px}
.p2sec{
  background:#fff;border:1px solid #E8ECF2;
  border-radius:14px;padding:18px 20px;margin-bottom:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.p2ttl{font-size:13px;font-weight:700;color:#1E1B4B;margin-bottom:14px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:#7C7AB0;text-transform:uppercase;letter-spacing:.06em;background:rgba(99,102,241,.06);border-bottom:0.5px solid rgba(99,102,241,.12);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:0.5px solid rgba(99,102,241,.07);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(99,102,241,.04)}
.tbl th.r,.tbl td.r{text-align:right}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.rbar{display:flex;align-items:center;gap:7px}
.rtrack{flex:1;height:5px;background:rgba(99,102,241,.1);border-radius:20px;overflow:hidden}
.rfill{height:100%;border-radius:20px}
.rval{font-size:11px;font-weight:700;width:34px;text-align:right;font-family:'DM Mono',monospace}
.sw{position:relative}
.sw input{padding:6px 12px 6px 28px;font-size:12px;border:0.5px solid rgba(99,102,241,.2);border-radius:9px;outline:none;width:220px;color:#1E1B4B;background:rgba(255,255,255,.8)}
.sw input:focus{border-color:rgba(129,140,248,.6);box-shadow:0 0 0 3px rgba(129,140,248,.12)}
.sw-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:#A5B4FC;font-size:12px}
.p2top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.empty{text-align:center;padding:60px;color:rgba(255,255,255,.35);font-size:13px}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div>
      <div class="hdr-title">영업 파이프라인 CRM</div>
      <div class="hdr-sub">Sales Pipeline Management</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="hdr-mock" id="bmock" style="display:none">📊 테스트 데이터</span>
    <span class="hdr-upd"  id="bupd"  style="display:none"></span>
    <div class="tabs">
      <button class="tab on"  onclick="gotoTab('p1')">🏠 홈</button>
      <button class="tab off" onclick="gotoTab('p2')">📊 상세</button>
    </div>
  </div>
</div>

<!-- ══ PAGE 1 ══ -->
<div id="vp1" class="view on">
  <!-- 요약 카드 -->
  <div class="summary-bar">
    <div class="sum-card sc-all" id="sc-all" onclick="setSumFilter('전체')">
      <div class="sum-ic">📋</div>
      <div><div class="sum-num" id="sn-all">0</div><div class="sum-lbl">전체</div></div>
    </div>
    <div class="sum-div"></div>
    <div class="sum-card sc-ing" id="sc-ing" onclick="setSumFilter('진행중')">
      <div class="sum-ic">🔵</div>
      <div><div class="sum-num" id="sn-ing">0</div><div class="sum-lbl">진행중</div></div>
    </div>
    <div class="sum-card sc-ok" id="sc-ok" onclick="setSumFilter('성공')">
      <div class="sum-ic">🎯</div>
      <div><div class="sum-num" id="sn-ok">0</div><div class="sum-lbl">성공</div></div>
    </div>
    <div class="sum-card sc-fail" id="sc-fail" onclick="setSumFilter('실패')">
      <div class="sum-ic">⬜</div>
      <div><div class="sum-num" id="sn-fail">0</div><div class="sum-lbl">실패·보류</div></div>
    </div>
  </div>
  <!-- 필터 -->
  <div class="fbar" id="fbar1"></div>
  <!-- 카드 -->
  <div class="main"><div class="grid2" id="cardgrid"></div></div>
</div>

<!-- ══ PAGE 2 ══ -->
<div id="vp2" class="view">
  <div class="p2-fbar" id="fbar2"></div>
  <div class="p2-main">
    <div class="p2sec">
      <div class="p2ttl">🏢 그룹별 현황</div>
      <div id="grptbl"></div>
    </div>
    <div class="p2sec">
      <div class="p2ttl">👥 담당자별 현황</div>
      <div id="reptbl"></div>
    </div>
    <div class="p2sec">
      <div class="p2top">
        <div class="p2ttl" style="margin-bottom:0">📋 계약 리스트 <span id="ccount" style="font-size:11px;color:#8B83C8;font-weight:400"></span></div>
        <div class="sw"><span class="sw-ico">🔍</span><input id="srch" placeholder="고객사, 영업기회, 담당자..." oninput="renderContracts()"/></div>
      </div>
      <div style="overflow-x:auto"><table class="tbl" id="ctbl"></table></div>
    </div>
  </div>
</div>

<script>
const URLS={
  opp:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSartuqFOQxch07oPwHSUzzvOvMchKB5zQugB0Ea7p_xU2c9GIE1xYp9KbbeBvc2ZYDAwwpYON-a7fn/pub?gid=0&single=true&output=csv",
  contract:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSartuqFOQxch07oPwHSUzzvOvMchKB5zQugB0Ea7p_xU2c9GIE1xYp9KbbeBvc2ZYDAwwpYON-a7fn/pub?gid=1887387173&single=true&output=csv",
  group:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSartuqFOQxch07oPwHSUzzvOvMchKB5zQugB0Ea7p_xU2c9GIE1xYp9KbbeBvc2ZYDAwwpYON-a7fn/pub?gid=305091937&single=true&output=csv",
};

const STAGES=['기회인지','제안','견적','계약','개통완료'];
const SHORT =['기회','제안','견적','계약','완료'];

// 단계별 그라디언트 색상 (글래스 스타일)
const PIPE_ACTIVE=[
  {bg:'#EEEDFE',tx:'#3C3489',border:'#CECBF6'},
  {bg:'#CECBF6',tx:'#3C3489',border:'#AFA9EC'},
  {bg:'#AFA9EC',tx:'#26215C',border:'#7F77DD'},
  {bg:'#F4C0D1',tx:'#72243E',border:'#ED93B1'},
  {bg:'#D4537E',tx:'#fff',  border:'#993556'},
];
const PIPE_INACTIVE={bg:'#F1F5F9',tx:'#CBD5E1',border:'#E2E8F0'};
const PIPE_CURR_GLOW=['rgba(127,119,221,.3)','rgba(127,119,221,.3)','rgba(127,119,221,.3)','rgba(212,83,126,.3)','rgba(212,83,126,.3)'];

// 발령 직원
let LEFT_SET=new Set(['조재현']);

function getStatus(o){
  const s=o.진행상태||'', d=o.단계||'';
  if(s==='종료(성공)'||d==='계약'||d==='개통완료') return 'ok';
  if(s==='진행중') return 'ing';
  if(s==='종료(실패)') return 'fail';
  if(s==='보류/연기') return 'hold';
  return 'fail';
}
function getStatusCfg(o){
  const st=getStatus(o);
  const m={
    ok:  {l:'성공',  bg:'rgba(236,72,153,.12)',tx:'#9D174D',border:'rgba(236,72,153,.3)',ic:'✓'},
    ing: {l:'진행중', bg:'rgba(96,165,250,.12)',tx:'#1D4ED8',border:'rgba(96,165,250,.3)',ic:'●'},
    fail:{l:'실패',  bg:'rgba(148,163,184,.12)',tx:'#475569',border:'rgba(148,163,184,.25)',ic:'✕'},
    hold:{l:'보류',  bg:'rgba(148,163,184,.1)', tx:'#64748B',border:'rgba(148,163,184,.2)', ic:'◐'},
  };
  return m[st]||m.fail;
}

// Mock
const MG=[
  {이름:'박현민',그룹:'1그룹',발령:'N'},{이름:'이영철',그룹:'1그룹',발령:'N'},
  {이름:'나영기',그룹:'1그룹',발령:'N'},{이름:'조혜란',그룹:'1그룹',발령:'N'},
  {이름:'김창석',그룹:'1그룹',발령:'N'},{이름:'이민혁',그룹:'2그룹',발령:'N'},
  {이름:'신헌우',그룹:'2그룹',발령:'N'},{이름:'박준호',그룹:'2그룹',발령:'N'},
  {이름:'남승지',그룹:'2그룹',발령:'N'},{이름:'김민수',그룹:'3그룹',발령:'N'},
  {이름:'손민욱',그룹:'3그룹',발령:'N'},{이름:'김동후',그룹:'3그룹',발령:'N'},
  {이름:'이상호',그룹:'3그룹',발령:'N'},{이름:'조재현',그룹:'2그룹',발령:'Y'},
];
const MO=[
  {영업기회ID:'1074',영업기회:'(신규)_앰엔와이즈 Colocation',고객사:'엠앤와이즈',담당자:'손민욱',진행상태:'진행중',제품:'기업코로케이션',예상매출:0,시작일:'2026.05.22',종료일:'2026.06.21',변경일:'',단계:'기회인지',비고:''},

function csv(t){
  if(!t?.trim()) return [];
  try{
    const ls=t.trim().split(/\r?\n/);
    const hs=ls[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
    return ls.slice(1).filter(l=>l.trim()).map(l=>{
      const vs=[]; let c='',q=false;
      for(const x of l){if(x==='"')q=!q;else if(x===','&&!q){vs.push(c);c='';}else c+=x;}
      vs.push(c);
      const o={}; hs.forEach((h,i)=>o[h]=(vs[i]||'').replace(/^"|"$/g,'').trim());
      return o;
    }).filter(r=>Object.values(r).some(v=>v&&v.trim()))
      .filter(r=>r['영업기회']&&r['영업기회'].trim())
      .filter(r=>{const id=r['영업기회ID']||r['영업기회Id']||''; return !id||/^\d+$/.test(String(id).trim());});
  }catch(e){return [];}
}

function dd(s){if(!s)return 999;const p=String(s).split('.');if(p.length!==3)return 999;return Math.floor((Date.now()-new Date(+p[0],+p[1]-1,+p[2]).getTime())/86400000);}
function stale(o){return getStatus(o)==='ing'&&dd(o.변경일||o.시작일)>=14;}
function getAmt(o){const v=o['예상매출']||o['예상매출금액']||0;return Number(String(v).replace(/,/g,''))||0;}
function fmtA(n){const v=n*1000;if(!v)return '';if(v>=100000000)return(v/100000000).toFixed(1)+'억원';if(v>=10000000)return Math.round(v/10000000)+'천만원';if(v>=1000000)return(v/1000000).toFixed(1)+'백만원';if(v>=10000)return Math.round(v/10000)+'만원';return v.toLocaleString()+'원';}
function fmtAD(n){const v=Number(String(n||0).replace(/,/g,''))*1000;if(!v)return '-';if(v>=100000000)return(v/100000000).toFixed(1)+'억원';if(v>=10000000)return Math.round(v/10000000)+'천만원';if(v>=1000000)return(v/1000000).toFixed(1)+'백만원';if(v>=10000)return Math.round(v/10000)+'만원';return v.toLocaleString()+'원';}
function rc(r){return r>=60?'#EC4899':r>=30?'#F59E0B':'#94A3B8';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function pipeHTML(o){
  const ci=STAGES.indexOf(o.단계);
  let h='<div class="pipe">';
  STAGES.forEach((s,i)=>{
    const done=i<ci, curr=i===ci, inactive=i>ci;
    let cfg;
    if(inactive) cfg=PIPE_INACTIVE;
    else if(curr) cfg={...PIPE_ACTIVE[i],glow:PIPE_CURR_GLOW[i]};
    else cfg=PIPE_ACTIVE[i];
    const shadow=curr?`box-shadow:0 2px 10px ${cfg.glow||'transparent'};`:'';
    h+=`<div class="pnode">
      <div class="pbox" style="background:${cfg.bg};color:${cfg.tx};border:0.5px solid ${cfg.border||'transparent'};${shadow}">${SHORT[i]}</div>
      <span class="ptxt" style="color:${inactive?'rgba(148,163,184,.4)':curr?cfg.tx:'rgba(148,163,184,.6)'}">${s}</span>
    </div>`;
    if(i<STAGES.length-1) h+=`<div style="width:3px;flex-shrink:0;margin-bottom:13px"></div>`;
  });
  return h+'</div>';
}

  </div>`;
}

function filtered1(){
  const st=F1.sumStatus;
  return OPP.filter(o=>{
    const oSt=getStatus(o);
    if(st==='진행중'&&oSt!=='ing') return false;
    if(st==='성공'&&oSt!=='ok') return false;
    if(st==='실패'&&oSt!=='fail'&&oSt!=='hold') return false;
    if(F1.stage!=='전체'&&o.단계!==F1.stage) return false;
    if(F1.group!=='전체'&&o.group!==F1.group) return false;
    if(F1.rep!=='전체'&&o.담당자!==F1.rep) return false;
    return true;
  });
}

        <div><div style="font-size:20px;font-weight:700;color:#0F172A;font-family:'DM Mono',monospace">${t}</div><div style="font-size:10px;color:#94A3B8;margin-top:2px">전체</div></div>
        <div><div style="font-size:20px;font-weight:700;color:#3B6FD4;font-family:'DM Mono',monospace">${ing}</div><div style="font-size:10px;color:#94A3B8;margin-top:2px">진행</div></div>
        <div><div style="font-size:20px;font-weight:700;color:#72243E;font-family:'DM Mono',monospace">${ok}</div><div style="font-size:10px;color:#94A3B8;margin-top:2px">성공</div></div>
        <div><div style="font-size:20px;font-weight:700;color:#888780;font-family:'DM Mono',monospace">${fail}</div><div style="font-size:10px;color:#94A3B8;margin-top:2px">실패</div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div style="display:flex;align-items:center;gap:8px;font-size:11px">
          <span style="color:#72243E;width:28px;flex-shrink:0">성공</span>
          <div style="flex:1;height:4px;background:#F1F5F9;border-radius:20px;overflow:hidden"><div style="width:${wr}%;background:#D4537E;height:100%;border-radius:20px"></div></div>
          <span style="font-weight:700;color:#72243E;width:30px;text-align:right;font-family:monospace">${wr}%</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:11px">
          <span style="color:#888780;width:28px;flex-shrink:0">실패</span>
          <div style="flex:1;height:4px;background:#F1F5F9;border-radius:20px;overflow:hidden"><div style="width:${fr}%;background:#B4B2A9;height:100%;border-radius:20px"></div></div>
          <span style="font-weight:700;color:#888780;width:30px;text-align:right;font-family:monospace">${fr}%</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('grptbl').outerHTML=`<div id="grptbl" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${cards}</div>`;
}

function renderRepTable(){
  const AVA_BG=['#EEEDFE','#FBEAF0','#E1F5EE','#FAEEDA','#E6F1FB'];
  const AVA_TX=['#3C3489','#72243E','#085041','#633806','#0C447C'];
  const opps=F2.group==='전체'?OPP:OPP.filter(o=>o.group===F2.group);
  const reps=[...new Set(opps.map(o=>o.담당자).filter(Boolean))];
  const stats=reps.map(rep=>{
    const ds=opps.filter(o=>o.담당자===rep);
    const ok=ds.filter(o=>getStatus(o)==='ok').length;
    const fail=ds.filter(o=>['fail','hold'].includes(getStatus(o))).length;
    const ing=ds.filter(o=>getStatus(o)==='ing').length;
    const t=ds.length, wr=t?Math.round(ok/t*100):0;
    return {rep,group:GM[rep]||'',t,ing,ok,fail,wr,left:LEFT_SET.has(rep)};
  }).sort((a,b)=>b.t-a.t);
  const cards=stats.map(r=>{
    const ai=r.rep.charCodeAt(0)%5;
    return `<div style="border:1px solid #E8ECF2;border-radius:12px;padding:13px;background:#fff">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:${AVA_BG[ai]};color:${AVA_TX[ai]};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${r.rep.charAt(0)}</div>
        <div>
          <div style="font-size:12px;font-weight:700;color:${r.left?'#94A3B8':'#0F172A'};${r.left?'text-decoration:line-through':''}">${esc(r.rep)}${r.left?' 📦':''}</div>
          <div style="font-size:10px;color:#94A3B8">${esc(r.group)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px;text-align:center">
        <div style="background:#F8FAFC;border-radius:6px;padding:5px 2px">
          <div style="font-size:15px;font-weight:700;color:#0F172A;font-family:monospace">${r.t}</div>
          <div style="font-size:9px;color:#94A3B8">전체</div>
        </div>
        <div style="background:#EFF6FF;border-radius:6px;padding:5px 2px">
          <div style="font-size:15px;font-weight:700;color:#3B6FD4;font-family:monospace">${r.ing}</div>
          <div style="font-size:9px;color:#94A3B8">진행</div>
        </div>
        <div style="background:#FDF0F5;border-radius:6px;padding:5px 2px">
          <div style="font-size:15px;font-weight:700;color:#72243E;font-family:monospace">${r.ok}</div>
          <div style="font-size:9px;color:#94A3B8">성공</div>
        </div>
        <div style="background:#F8FAFC;border-radius:6px;padding:5px 2px">
          <div style="font-size:15px;font-weight:700;color:#888780;font-family:monospace">${r.fail}</div>
          <div style="font-size:9px;color:#94A3B8">실패</div>
        </div>
      </div>
      <div style="height:3px;background:#F1F5F9;border-radius:20px;overflow:hidden;margin-bottom:4px">
        <div style="width:${r.wr}%;background:#7F77DD;height:100%;border-radius:20px"></div>
      </div>
      <div style="font-size:10px;color:#7F77DD;text-align:right;font-weight:600">성공률 ${r.wr}%</div>
    </div>`;
  }).join('');
  document.getElementById('reptbl').outerHTML=`<div id="reptbl" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px">${cards||'<div style="color:#94A3B8;font-size:13px;padding:20px">데이터 없음</div>'}</div>`;
}

function renderContracts(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const om={};OPP.forEach(o=>{om[String(o.영업기회ID)]=o;});
  let raw=CONTRACT.map(c=>({...c,
    고객사:c.고객사||c['고객사']||'',담당자:c.담당자||c['담당자']||'',
    계약일:c.계약일||c['계약일']||'',연관제품:c.연관제품||c['연관제품']||'',
    opp:om[String(c.영업기회ID||c['영업기회ID'])]||null,
    group:GM[c.담당자||c['담당자']]||'',
    _amt:Number(String(c.공급가액||c['공급가액']||0).replace(/,/g,''))||0,
  }));
  if(F2.group!=='전체') raw=raw.filter(c=>c.group===F2.group);
  if(q) raw=raw.filter(c=>c.고객사.toLowerCase().includes(q)||(c.opp?.영업기회||'').toLowerCase().includes(q)||c.담당자.toLowerCase().includes(q));
  const map={};
  raw.forEach(c=>{
    const key=c.담당자+'__'+c.고객사;
    if(!map[key]) map[key]={...c,_total:c._amt,_cnt:1,_dates:[c.계약일].filter(Boolean),_prods:[c.연관제품].filter(Boolean)};
    else{map[key]._total+=c._amt;map[key]._cnt++;if(c.계약일)map[key]._dates.push(c.계약일);if(c.연관제품&&!map[key]._prods.includes(c.연관제품))map[key]._prods.push(c.연관제품);}
  });
  const list=Object.values(map).sort((a,b)=>b._total-a._total);
  document.getElementById('ccount').textContent='총 '+list.length+'건';
  const rows=list.map(c=>`<tr>
    <td><div style="font-weight:600;color:#1E1B4B">${esc(c.고객사)}</div>${c._cnt>1?`<div style="font-size:10px;color:#8B83C8">${c._cnt}건 합산</div>`:''}</td>
    <td style="max-width:200px"><div style="font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(c.opp?.영업기회||'')}">${esc(c.opp?.영업기회||'-')}</div></td>
    <td><div style="font-weight:500;color:#1E1B4B">${esc(c.담당자)}</div><div style="font-size:10px;color:#8B83C8">${esc(c.group)}</div></td>
    <td style="font-family:'DM Mono',monospace;font-size:11px;color:#8B83C8;white-space:nowrap">${esc(c._dates.slice(-1)[0]||'')}</td>
    <td>${c._prods.length?`<span class="tag" style="background:rgba(99,102,241,.08);color:#6366F1;border:0.5px solid rgba(99,102,241,.15)">${esc(c._prods.join(', '))}</span>`:'-'}</td>
    <td class="r" style="font-family:'DM Mono',monospace;font-weight:700;color:#1E1B4B;white-space:nowrap">${fmtAD(c._total/1000)}</td>
  </tr>`).join('');
  document.getElementById('ctbl').innerHTML=`
    <thead><tr><th>고객사</th><th>영업기회명</th><th>담당자</th><th>계약일</th><th>제품</th><th class="r">합산 금액</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:40px;color:#8B83C8">데이터 없음</td></tr>'}</tbody>`;
}
window.renderContracts=renderContracts;

function gotoTab(t){
  document.getElementById('vp1').className='view'+(t==='p1'?' on':'');
  document.getElementById('vp2').className='view'+(t==='p2'?' on':'');
  document.querySelectorAll('.tab').forEach((b,i)=>b.className='tab '+(i===0&&t==='p1'||i===1&&t==='p2'?'on':'off'));
  if(t==='p2') renderPage2();
}
window.gotoTab=gotoTab;

function renderPage2(){renderFbar2();renderGrpTable();renderRepTable();renderContracts();}

function buildGM(rows){
  const g={};
  if(!rows||!rows.length) return g;
  // 첫 행 키 확인해서 컬럼명 자동 탐지
  const sample=rows[0];
  const keys=Object.keys(sample);
  const nameKey=keys.find(k=>/이름|name|담당자|사원|직원/i.test(k))||keys[0];
  const grpKey =keys.find(k=>/그룹|group/i.test(k))||keys[1];
  const leftKey=keys.find(k=>/발령|left|이관|퇴사/i.test(k));
  rows.forEach(r=>{
    const name=(r[nameKey]||'').trim();
    const grp =(r[grpKey] ||'').trim();
    if(name){
      g[name]=grp;
      if(leftKey&&(r[leftKey]==='Y'||r[leftKey]==='y')) LEFT_SET.add(name);
    }
  });
  return g;
}

function loadData(oppR,contractR,gm){
  GM=gm;
  OPP=oppR.map(o=>({...o,group:gm[o['담당자']]||''}));
  CONTRACT=contractR;
  updateSummary();renderFbar1();renderCards();
}

async function init(){
  try{
    const [ot,ct,gt]=await Promise.all([
      fetch(URLS.opp).then(r=>r.ok?r.text():null).catch(()=>null),
      fetch(URLS.contract).then(r=>r.ok?r.text():null).catch(()=>null),
      fetch(URLS.group).then(r=>r.ok?r.text():null).catch(()=>null),
    ]);
    const gm=buildGM(gt?csv(gt):MG);
    const op=ot?csv(ot):null;
    if(op&&op.length>0){
      loadData(op,ct?csv(ct):MC,gm);
      const bu=document.getElementById('bupd');
      bu.textContent='업데이트: '+new Date().toLocaleDateString('ko-KR');
      bu.style.display='';
    } else throw new Error('empty');
  }catch(e){
    loadData(MO,MC,buildGM(MG));
    document.getElementById('bmock').style.display='';
  }
}
init();
</script>
</body>
